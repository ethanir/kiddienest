<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>KiddieNest — Offline</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
        display: flex; align-items: center; justify-content: center;
        padding: 24px; text-align: center;
        background: #f8fafc; color: #0f172a;
      }
      .card {
        max-width: 360px; width: 100%;
        border: 1px solid #e2e8f0; border-radius: 20px;
        background: #ffffff; padding: 32px 24px;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.06);
      }
      .badge {
        width: 56px; height: 56px; margin: 0 auto 16px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 16px; background: #0f172a;
      }
      .badge img { width: 36px; height: 36px; }
      h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #64748b; margin: 0 0 20px; }
      button {
        appearance: none; cursor: pointer;
        border: 0; border-radius: 9999px;
        background: #059669; color: #fff;
        font-size: 14px; font-weight: 600;
        padding: 12px 22px; width: 100%;
      }
      button:hover { background: #047857; }
      @media (prefers-color-scheme: dark) {
        body { background: #020617; color: #f1f5f9; }
        .card { background: rgba(15, 23, 42, 0.9); border-color: rgba(255,255,255,0.08); }
        .badge { background: #ffffff; }
        p { color: #94a3b8; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"><img src="/brand-emblem.png" alt="" /></div>
      <h1>You're offline</h1>
      <p>KiddieNest can't reach the internet right now. Check your connection and try again — your child's updates will be here when you're back.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
